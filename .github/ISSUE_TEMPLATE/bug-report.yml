name: Bug Report\ndescription: Use this template to report a bug.\nlabels: [bug]\n\nbody:\n  - type: input\n    id: summary\n    attributes:\n      label: Summary\n      required: true\n  - type: dropdown\n    id: priority\n    attributes:\n      label: Priority\n      required: true\n      options: [Low, Medium, High, Critical]\n  - type: textarea\n    id: steps\n    attributes:\n      label: Steps to reproduce\n      description: Describe the steps to reproduce the bug.\n      required: true\n  - type: textarea\n    id: expected\n    attributes:\n      label: Expected behavior\n      description: What you expected to happen.\n      required: false\n  - type: textarea\n    id: screenshots\n    attributes:\n      label: Screenshots or logs\n      description: Add any relevant screenshots, logs, or error messages.\n      required: false\n